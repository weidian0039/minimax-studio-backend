name: Mobile CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

env:
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Lint + Type Check
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run ESLint
        working-directory: mobile
        run: npx eslint . --max-warnings=0

      - name: Run TypeScript type check
        working-directory: mobile
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run Jest tests
        working-directory: mobile
        run: npm run test -- --coverage
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # JOB 3: iOS Build
  # ─────────────────────────────────────────────────────────
  ios-build:
    name: iOS Build
    runs-on: macos-14
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Ruby dependencies
        working-directory: mobile/ios
        run: bundle install

      - name: Install npm dependencies
        working-directory: mobile
        run: npm ci

      - name: Install iOS pods
        working-directory: mobile/ios
        run: pod install

      - name: Build iOS (Debug)
        working-directory: mobile/ios
        run: |
          xcodebuild -workspace MiniMaxStudio.xcworkspace \
            -scheme MiniMaxStudio \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            -allowProvisioningUpdates \
            build CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: mobile/ios/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 4: Android Build
  # ─────────────────────────────────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android (Debug)
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 5: iOS TestFlight Deploy (on release tag)
  # ─────────────────────────────────────────────────────────
  ios-deploy-testflight:
    name: iOS TestFlight Deploy
    runs-on: macos-14
    needs: [ios-build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: beta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup Ruby for Fastlane
        working-directory: mobile/ios
        run: bundle install

      - name: Install iOS pods
        working-directory: mobile/ios
        run: pod install

      - name: Build iOS for TestFlight
        working-directory: mobile/ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          echo "${{ secrets.FASTLANE_CERTIFICATE }}" | base64 -d > Certificates.p12
          bundle exec fastlane beta
